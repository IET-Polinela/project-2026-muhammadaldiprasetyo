<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}AGRO CITY{% endblock %}</title>
    {% block extra_head %}{% endblock %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css">
    <style>
        :root {
            --agro-green: #006948;
            --agro-green-dark: #005238;
            --agro-green-light: #e8f5ee;
            --bs-primary: #006948;
            --bs-primary-rgb: 0, 105, 72;
            --bs-link-color: #006948;
            --bs-link-color-rgb: 0, 105, 72;
            --bs-link-hover-color: #005238;
            --bs-link-hover-color-rgb: 0, 82, 56;
        }
        body {
            background-color: #f7fbf8 !important;
        }
        .text-primary {
            color: var(--agro-green) !important;
        }
        .bg-primary {
            background-color: var(--agro-green) !important;
        }
        .border-primary {
            border-color: var(--agro-green) !important;
        }
        .btn-primary {
            --bs-btn-bg: var(--agro-green);
            --bs-btn-border-color: var(--agro-green);
            --bs-btn-hover-bg: var(--agro-green-dark);
            --bs-btn-hover-border-color: var(--agro-green-dark);
            --bs-btn-active-bg: var(--agro-green-dark);
            --bs-btn-active-border-color: var(--agro-green-dark);
            --bs-btn-disabled-bg: var(--agro-green);
            --bs-btn-disabled-border-color: var(--agro-green);
        }
        .btn-outline-primary {
            --bs-btn-color: var(--agro-green);
            --bs-btn-border-color: var(--agro-green);
            --bs-btn-hover-bg: var(--agro-green);
            --bs-btn-hover-border-color: var(--agro-green);
            --bs-btn-active-bg: var(--agro-green-dark);
            --bs-btn-active-border-color: var(--agro-green-dark);
            --bs-btn-disabled-color: var(--agro-green);
            --bs-btn-disabled-border-color: var(--agro-green);
        }
        .form-control:focus,
        .form-select:focus {
            border-color: #4ca37f;
            box-shadow: 0 0 0 0.25rem rgba(0, 105, 72, 0.18);
        }
        .form-check-input:checked {
            background-color: var(--agro-green);
            border-color: var(--agro-green);
        }
        .form-check-input:focus {
            border-color: #4ca37f;
            box-shadow: 0 0 0 0.25rem rgba(0, 105, 72, 0.18);
        }
        .app-navbar {
            background-color: #ffffff;
            border-bottom: 1px solid rgba(107, 122, 116, 0.16);
            min-height: 80px;
            position: relative;
            z-index: 1030;
        }
        /* Tailwind's .collapse utility conflicts with Bootstrap's navbar class. */
        .app-navbar .navbar-collapse {
            visibility: visible !important;
        }
        .app-navbar .navbar-brand {
            color: #006948;
            font-weight: 700;
            letter-spacing: 0.03em;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .app-navbar .navbar-nav .nav-link {
            color: #3f6353;
            font-weight: 500;
            padding: 0.6rem 0.9rem;
        }
        .app-navbar .navbar-nav .nav-link:hover,
        .app-navbar .navbar-nav .nav-link.active {
            color: #006948;
        }
        .app-navbar .navbar-nav .nav-link.active {
            border-bottom: 2px solid #006948;
        }
        .app-navbar .user-badge {
            font-size: 0.72rem;
            padding: 0.35rem 0.8rem;
            border-radius: 999px;
        }
        .app-navbar .user-info {
            background-color: #edf7ee;
            padding: 0.45rem 0.85rem;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .app-navbar .user-icon {
            color: #006948;
            font-size: 1.35rem;
            line-height: 1;
        }
        .app-navbar .logout-button {
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.45rem 0.8rem;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-light app-navbar shadow-sm">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center gap-2" href="{% url 'home' %}">
                <i class="bi bi-tree-fill fs-4"></i>
                <span class="fw-bold">Agro City</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}" href="{% url 'home' %}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'report_list' or request.resolver_match.url_name == 'report_detail' or request.resolver_match.url_name == 'add_report' or request.resolver_match.url_name == 'update_report' or request.resolver_match.url_name == 'delete_report' or request.resolver_match.url_name == 'update_status' %}active{% endif %}" href="{% url 'report_list' %}">Reports</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'about' %}active{% endif %}" href="{% url 'about' %}">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'contact' %}active{% endif %}" href="{% url 'contact' %}">Contact</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}" href="{% url 'dashboard' %}">Dashboard</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center gap-2 ms-auto ms-lg-3">
                    {% if user.is_authenticated %}
                        <div class="user-info">
                            <i class="bi bi-person-circle user-icon" aria-hidden="true"></i>
                            <span class="fw-semibold">{{ user.username }}</span>
                            <span class="badge user-badge bg-primary text-white">
                                {% if user.is_admin %}Admin{% else %}Citizen{% endif %}
                            </span>
                        </div>
                        <form method="post" action="{% url 'logout' %}" class="m-0">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-outline-danger btn-sm logout-button">
                                <i class="bi bi-box-arrow-right" aria-hidden="true"></i>
                                <span>Logout</span>
                            </button>
                        </form>
                    {% else %}
                        <a class="btn btn-outline-primary btn-sm" href="{% url 'login' %}">Login</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <script>
        {% if messages %}
            {% for message in messages %}
                Swal.fire({
                    icon: '{% if message.tags == "error" %}error{% elif message.tags == "success" %}success{% else %}info{% endif %}',
                    iconColor: '{% if message.tags == "error" %}#dc3545{% else %}#006948{% endif %}',
                    title: 'Notifikasi',
                    text: '{{ message }}',
                    showConfirmButton: false,
                    timer: 3000,
                    timerProgressBar: true
                });
            {% endfor %}
        {% endif %}
    </script>

    <div class="container-fluid px-4 mt-4 mb-5">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
