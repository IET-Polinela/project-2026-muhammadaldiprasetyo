<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Warga Smart City Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; transition: background-color 0.3s ease; }
        .spa-container { min-height: calc(100vh - 80px); }
        .border-dashed { border: 2px dashed #a3cfbb; }
        .card-custom { border-radius: 12px; }
        /* Kelas transisi warna navbar */
        .navbar-transition { transition: background-color 0.3s ease, box-shadow 0.3s ease; }
    </style>
</head>
<body>

    <nav id="main-navbar" class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm navbar-transition">
        <div class="container-fluid px-4">
            <a id="navbar-title" class="navbar-brand fw-bold d-flex align-items-center" href="#">
                <i class="bi bi-buildings-fill me-2"></i> Smart City Portal
            </a>
            
            <div id="nav-menus" class="ms-auto d-flex align-items-center"></div>
        </div>
    </nav>

    <main class="container-fluid px-4 mt-4 spa-container" id="app-content"></main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/router.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
