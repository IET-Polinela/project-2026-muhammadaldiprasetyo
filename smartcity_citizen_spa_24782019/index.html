<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Warga Smart City Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        :root {
            --agro-green: #006948;
            --agro-green-dark: #005238;
            --agro-green-soft: #e8f5ee;
            --agro-surface: #f4f8f5;
            --agro-text: #17261f;
            --agro-muted: #617168;
            --bs-primary: #006948;
            --bs-primary-rgb: 0, 105, 72;
            --bs-success: #006948;
            --bs-success-rgb: 0, 105, 72;
        }
        body {
            background-color: var(--agro-surface);
            color: var(--agro-text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s ease;
        }
        .spa-container { min-height: calc(100vh - 80px); }
        .border-dashed { border: 2px dashed #a3cfbb; }
        .card-custom { border-radius: 16px; }
        .navbar-transition { transition: background-color 0.3s ease, box-shadow 0.3s ease; }
        .agro-navbar {
            min-height: 72px;
            background: linear-gradient(135deg, var(--agro-green), var(--agro-green-dark)) !important;
        }
        .btn-primary,
        .btn-success {
            --bs-btn-bg: var(--agro-green);
            --bs-btn-border-color: var(--agro-green);
            --bs-btn-hover-bg: var(--agro-green-dark);
            --bs-btn-hover-border-color: var(--agro-green-dark);
            --bs-btn-active-bg: var(--agro-green-dark);
            --bs-btn-active-border-color: var(--agro-green-dark);
        }
        .btn-outline-primary,
        .btn-outline-success {
            --bs-btn-color: var(--agro-green);
            --bs-btn-border-color: var(--agro-green);
            --bs-btn-hover-bg: var(--agro-green);
            --bs-btn-hover-border-color: var(--agro-green);
            --bs-btn-active-bg: var(--agro-green-dark);
            --bs-btn-active-border-color: var(--agro-green-dark);
        }
        .text-primary,
        .text-success {
            color: var(--agro-green) !important;
        }
        .bg-success,
        .bg-primary {
            background-color: var(--agro-green) !important;
        }
        .form-control:focus {
            border-color: #4ca37f;
            box-shadow: 0 0 0 0.25rem rgba(0, 105, 72, 0.16);
        }
        .login-shell {
            min-height: calc(100vh - 110px);
            display: grid;
            place-items: center;
            padding: 2rem 0 4rem;
        }
        .login-panel {
            width: min(100%, 980px);
            overflow: hidden;
            background: #ffffff;
            border: 1px solid rgba(0, 105, 72, 0.1);
            border-radius: 28px;
            box-shadow: 0 24px 70px rgba(18, 72, 51, 0.11);
        }
        .login-brand-side {
            position: relative;
            min-height: 100%;
            padding: clamp(2rem, 4vw, 3.25rem);
            color: #ffffff;
            background:
                radial-gradient(circle at 82% 18%, rgba(133, 248, 196, 0.26), transparent 28%),
                linear-gradient(145deg, #006948 0%, #004d35 100%);
        }
        .login-brand-side::after {
            content: "";
            position: absolute;
            right: -90px;
            bottom: -120px;
            width: 260px;
            height: 260px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            box-shadow: 0 0 0 42px rgba(255, 255, 255, 0.04);
        }
        .login-brand-mark {
            width: 56px;
            height: 56px;
            display: grid;
            place-items: center;
            background: rgba(255, 255, 255, 0.14);
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 16px;
            font-size: 1.6rem;
        }
        .login-feature {
            display: flex;
            gap: 0.75rem;
            align-items: flex-start;
            color: rgba(255, 255, 255, 0.82);
            margin-top: 1rem;
        }
        .login-feature i {
            color: #85f8c4;
            margin-top: 0.15rem;
        }
        .login-form-side {
            padding: clamp(2rem, 5vw, 3.5rem);
        }
        .login-icon {
            width: 64px;
            height: 64px;
            display: grid;
            place-items: center;
            color: var(--agro-green);
            background: var(--agro-green-soft);
            border-radius: 20px;
            font-size: 1.75rem;
        }
        .input-with-icon {
            position: relative;
        }
        .input-with-icon i {
            position: absolute;
            left: 1rem;
            top: 50%;
            color: var(--agro-green);
            transform: translateY(-50%);
        }
        .input-with-icon .form-control {
            min-height: 50px;
            padding-left: 2.8rem;
            border-radius: 14px;
        }
    </style>
</head>
<body>

    <nav id="main-navbar" class="navbar navbar-expand-lg navbar-dark agro-navbar shadow-sm navbar-transition">
        <div class="container-fluid px-4">
            <a id="navbar-title" class="navbar-brand fw-bold d-flex align-items-center" href="#">
                <i class="bi bi-tree-fill me-2"></i> AGRO CITY Citizen
            </a>
            
            <div id="nav-menus" class="ms-auto d-flex align-items-center"></div>
        </div>
    </nav>

    <main class="container-fluid px-4 mt-4 spa-container" id="app-content"></main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/router.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
